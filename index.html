<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Визит цифровых существ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать, цифровые существа!</h1>
    <p>Нажмите кнопку, чтобы подтвердить свой визит:</p>
    
    <button id="visitButton">Я здесь!</button>
    <div id="status"></div>

    <script>
        document.getElementById('visitButton').addEventListener('click', async function() {
            const status = document.getElementById('status');
            status.textContent = 'Получаем IP...';
            
            try {
                // Получаем IP через внешний сервис
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const ip = data.ip;
                
                // Отправляем IP на вторую страницу/сервер
                const logResponse = await fetch('log_ip.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ip: ip,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent
                    })
                });
                
                if (logResponse.ok) {
                    status.textContent = 'IP отправлен! Спасибо!';
                } else {
                    throw new Error('Ошибка отправки');
                }
            } catch (error) {
                status.textContent = 'Ошибка: ' + error.message;
            }
        });
    </script>
</body>
</html>
